<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Scales of justice: minimalist, monoline -->
  <g stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Central vertical post -->
    <line x1="64" y1="30" x2="64" y2="96"/>
    <!-- Base -->
    <line x1="46" y1="100" x2="82" y2="100"/>
    <!-- Horizontal beam -->
    <line x1="32" y1="44" x2="96" y2="44"/>
    <!-- Left cords -->
    <line x1="36" y1="44" x2="28" y2="64"/>
    <line x1="36" y1="44" x2="44" y2="64"/>
    <!-- Right cords -->
    <line x1="92" y1="44" x2="84" y2="64"/>
    <line x1="92" y1="44" x2="100" y2="64"/>
  </g>

  <!-- Pans (filled arcs) -->
  <g fill="white">
    <path d="M24 64 L48 64 A12 12 0 0 1 24 64 Z"/>
    <path d="M80 64 L104 64 A12 12 0 0 1 80 64 Z"/>
  </g>

  <!-- Top pivot dot -->
  <circle cx="64" cy="30" r="3.5" fill="white"/>
</svg>
