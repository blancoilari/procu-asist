<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background: rounded square with gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shield" x1="40" y1="20" x2="88" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#dbeafe" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Shield / legal document shape -->
  <path d="M64 18 L96 34 L96 68 C96 88 82 102 64 110 C46 102 32 88 32 68 L32 34 Z"
        fill="url(#shield)" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Checkmark / gavel symbol inside -->
  <path d="M50 62 L60 72 L80 48"
        stroke="#2563eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Small "P" letter accent -->
  <text x="64" y="98" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="700" fill="white" opacity="0.7">PA</text>
</svg>
